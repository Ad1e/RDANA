<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Rapid Damage Assessment and Needs Analysis (RDANA) building inspection report form. Fill out inspection details, building description, damage evaluation, and generate an official printed report." />
  <title>RDANA Report</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />

  <script>
    /* Extend Tailwind with animate-in utilities */
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'ui-sans-serif', 'system-ui'] },
          keyframes: {
            fadeInSlide: {
              '0%':   { opacity: '0', transform: 'translateX(1rem)' },
              '100%': { opacity: '1', transform: 'translateX(0)' }
            },
            fadeInUp: {
              '0%':   { opacity: '0', transform: 'translateY(2rem)' },
              '100%': { opacity: '1', transform: 'translateY(0)' }
            }
          },
          animation: {
            'fade-slide-in':  'fadeInSlide 0.3s ease both',
            'fade-up-in':     'fadeInUp 0.5s ease both'
          }
        }
      }
    }
  </script>

  <style>
    /* ── Base ──────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: 'Inter', ui-sans-serif, system-ui; }

    /* ── Custom checkbox / radio visuals ───────────────── */
    .cb-box {
      width: 1.25rem; height: 1.25rem;
      border-radius: 0.25rem;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, border-color 0.15s;
      border: 2px solid #cbd5e1;
      background: #fff;
      cursor: pointer;
    }
    .cb-box.checked {
      background: linear-gradient(135deg, #ef4444, #e11d48);
      border-color: transparent;
      box-shadow: 0 1px 3px rgba(239,68,68,.35);
    }
    .cb-box-sm {
      width: 1rem; height: 1rem;
      border-radius: 0.2rem;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, border-color 0.15s;
      border: 1px solid #cbd5e1;
      background: #fff;
      cursor: pointer;
    }
    .cb-box-sm.checked { background: #ef4444; border-color: transparent; }
    .radio-dot {
      width: 1rem; height: 1rem;
      border-radius: 9999px;
      border: 2px solid #cbd5e1;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }
    .radio-dot.checked {
      background: #ef4444;
      border-color: #ef4444;
    }
    .radio-dot .dot { width: .5rem; height: .5rem; border-radius: 9999px; background: white; }

    /* ── Range slider ──────────────────────────────────── */
    input[type=range] { -webkit-appearance: none; appearance: none; }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 1.5rem; height: 1.5rem;
      border-radius: 9999px;
      background: #ef4444;
      border: 3px solid #fff;
      box-shadow: 0 0 0 2px #ef4444, 0 2px 6px rgba(239,68,68,.5);
      cursor: pointer;
    }
    input[type=range]::-moz-range-thumb {
      width: 1.5rem; height: 1.5rem;
      border-radius: 9999px;
      background: #ef4444;
      border: 3px solid #fff;
      box-shadow: 0 0 0 2px #ef4444, 0 2px 6px rgba(239,68,68,.5);
      cursor: pointer;
    }

    /* ── Hide native scrollbar ─────────────────────────── */
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    /* ── Step animation ─────────────────────────────────── */
    .step-panel { animation: fadeInSlide 0.3s ease both; }

    /* ── Print rules (from RDANA.css) ───────────────────── */
    @media print {
      @page { size: auto; margin: 0; }
      body { background: white !important; padding: 0; margin: 0;
             -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      .no-print { display: none !important; }
      .print-top-bar { display: none !important; }
      .max-w-4xl { max-width: 100% !important; padding: 0 !important; }
      .shadow-xl, .shadow-md { box-shadow: none !important; border: none !important; }
      input, textarea { border-bottom: 2px solid #cbd5e1 !important; color: black !important; }
    }

    /* ── Severity badge colours ─────────────────────────── */
    .badge-na       { background:#e2e8f0; border:1px solid #cbd5e1; color:#475569; }
    .badge-minor    { background:#10b981; border:1px solid #10b981; color:#fff; }
    .badge-moderate { background:#f59e0b; border:1px solid #f59e0b; color:#fff; }
    .badge-severe   { background:#ef4444; border:1px solid #ef4444; color:#fff; }
  </style>
</head>

function getSeverityBadgeClass(level) {
  if (level === 'SEVERE')   return 'badge-severe';
  if (level === 'MODERATE') return 'badge-moderate';
  if (level === 'MINOR')    return 'badge-minor';
  return 'badge-na';
}

function isFormComplete() {
  const f = appState.form;
  return f.inspector.trim() !== '' && f.buildingName.trim() !== '' && f.posting !== '';
}

function re() { render(); } /* short alias */

/* ╔══════════════════════════════════════════════════════╗
   ║           FORM UPDATE HELPERS                         ║
   ╚══════════════════════════════════════════════════════╝ */
function bindInput(id, field, nested) {
  const el = document.getElementById(id);
  if (!el) return;
  el.addEventListener('input', () => {
    if (nested) appState.form[nested][field] = el.type === 'checkbox' ? el.checked : el.value;
    else        appState.form[field]         = el.type === 'checkbox' ? el.checked : el.value;
    if (el.type === 'range') {
      const pct = document.getElementById('damage-pct-display');
      const pct2 = document.getElementById('damage-pct-display2');
      if (pct)  pct.textContent  = el.value + '%';
      if (pct2) pct2.textContent = el.value + '%';
      el.style.background = `linear-gradient(to right,#ef4444 ${el.value}%,#fee2e2 ${el.value}%)`;
    }
    if (field === 'inspector' || field === 'buildingName' || field === 'posting') {
      const btnPreview = document.getElementById('btn-preview');
      if (btnPreview) refreshPreviewBtn();
    }
  });
  el.addEventListener('change', () => {
    if (nested) appState.form[nested][field] = el.type === 'checkbox' ? el.checked : el.value;
    else        appState.form[field]         = el.type === 'checkbox' ? el.checked : el.value;
  });
}

/* ╔══════════════════════════════════════════════════════╗
   ║          STEP 0 — INSPECTION DETAILS                  ║
   ╚══════════════════════════════════════════════════════╝ */
function renderStep0() {
  const f = appState.form;
  const radioArea = (area) => {
    const sel = f.areasInspected === area;
    const selCls = sel ? 'bg-red-500 border-red-500' : 'border-slate-300';
    const dot    = sel ? '<div class="w-2 h-2 bg-white rounded-full"></div>' : '';
    return `
      <label class="flex items-center gap-2 cursor-pointer bg-white/80 px-4 py-2 rounded-xl border border-red-50 hover:border-red-200 transition-colors" onclick="setAreaInspected('${area}')">
        <div class="w-4 h-4 border-2 rounded-full flex items-center justify-center transition-colors ${selCls}">${dot}</div>
        <span class="text-sm font-bold text-slate-700">${area}</span>
      </label>`;
  };
  return `
    <section class="step-panel">
      <h2 class="text-xl font-bold text-red-900 border-b-2 border-red-100 pb-2 mb-6 uppercase tracking-wider flex items-center gap-2">
        <span class="text-red-500">1.</span> Inspection Details
      </h2>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-x-12 gap-y-6">
        <div>
          <label class="block text-sm font-bold text-slate-700 mb-1">Inspector</label>
          <input id="inp-inspector" type="text" value="${escHtml(f.inspector)}" placeholder="Required"
            class="w-full border-b-2 border-slate-200 focus:border-red-500 px-2 py-2 outline-none transition-colors bg-white/50" />
        </div>
        <div class="flex gap-4">
          <div class="flex-1">
            <label class="block text-sm font-bold text-slate-700 mb-1">Inspection date</label>
            <input id="inp-inspectionDate" type="date" value="${f.inspectionDate}"
              class="w-full border-b-2 border-slate-200 focus:border-red-500 px-2 py-2 outline-none transition-colors text-sm bg-white/50" />
          </div>
          <div class="flex-1">
            <label class="block text-sm font-bold text-slate-700 mb-1">Time</label>
            <input id="inp-time" type="time" value="${f.time}"
              class="w-full border-b-2 border-slate-200 focus:border-red-500 px-2 py-2 outline-none transition-colors text-sm bg-white/50" />
          </div>
        </div>
        <div>
          <label class="block text-sm font-bold text-slate-700 mb-1">Agency/Campus</label>
          <input id="inp-agencyCampus" type="text" value="${escHtml(f.agencyCampus)}"
            class="w-full border-b-2 border-slate-200 focus:border-red-500 px-2 py-2 outline-none transition-colors bg-white/50" />
        </div>
        <div>
          <label class="block text-sm font-bold text-slate-700 mb-3">Areas inspected</label>
          <div class="flex gap-6 flex-wrap">
            ${radioArea('Exterior Only')}
            ${radioArea('Exterior and interior')}
          </div>
        </div>
      </div>
    </section>`;
}

/* ╔══════════════════════════════════════════════════════╗
   ║         STEP 1 — BUILDING DESCRIPTION                 ║
   ╚══════════════════════════════════════════════════════╝ */
function renderStep1() {
  const f = appState.form;
  const cbConstruction = CONSTRUCTION_TYPES.map(type => {
    const sel = f.typeOfConstruction.includes(type);
    return `
      <label class="flex items-center gap-2 cursor-pointer group" onclick="toggleArray('typeOfConstruction','${type}')">
        <div class="cb-box${sel ? ' checked' : ''}">${sel ? checkSVG : ''}</div>
        <span class="text-sm font-semibold text-slate-700">${type}</span>

        <span class="text-xs sm:text-sm font-semibold text-slate-700">${occ}</span>

      <h2 class="text-xl font-bold text-red-900 border-b-2 border-red-100 pb-2 mb-6 uppercase tracking-wider flex items-center gap-2">
        <span class="text-red-500">2.</span> Building Description

      <div class="grid grid-cols-1 md:grid-cols-2 gap-x-12 gap-y-8">
        <div class="space-y-6">
          <div>
            <label class="block text-sm font-bold text-slate-700 mb-1">Building Name</label>
            <input id="inp-buildingName" type="text" value="${escHtml(f.buildingName)}" placeholder="Required"
              class="w-full border-b-2 border-slate-200 focus:border-red-500 px-2 py-2 outline-none bg-white/50" />
          </div>
          <div>
            <label class="block text-sm font-bold text-slate-700 mb-1">Address</label>
            <input id="inp-address" type="text" value="${escHtml(f.address)}"
              class="w-full border-b-2 border-slate-200 focus:border-red-500 px-2 py-2 outline-none bg-white/50" />
          </div>
          <div>
            <label class="block text-sm font-bold text-slate-700 mb-1">Building Marshal</label>
            <input id="inp-buildingMarshal" type="text" value="${escHtml(f.buildingMarshal)}"
              class="w-full border-b-2 border-slate-200 focus:border-red-500 px-2 py-2 outline-none bg-white/50" />
          </div>
          <div class="flex gap-6 items-center bg-white/50 p-3 rounded-xl border border-red-50">
            <span class="text-sm font-bold text-slate-700 whitespace-nowrap">Number of stories:</span>
            <div class="flex items-center gap-2">
              <span class="text-xs font-semibold text-slate-500 uppercase">Above grd:</span>
              <input id="inp-storyAboveGround" type="number" value="${f.storyAboveGround}"
                class="w-16 border-b-2 border-slate-200 focus:border-red-500 text-center px-1 py-1 outline-none bg-transparent font-bold text-red-900" />

            <div class="flex items-center gap-2">
              <span class="text-xs font-semibold text-slate-500 uppercase">Below grd:</span>
              <input id="inp-storyBelowGround" type="number" value="${f.storyBelowGround}"
                class="w-16 border-b-2 border-slate-200 focus:border-red-500 text-center px-1 py-1 outline-none bg-transparent font-bold text-red-900" />
            </div>
          </div>
        </div>
        <div class="space-y-8 bg-white/80 p-6 rounded-2xl border border-red-100 shadow-sm shadow-red-100/50">

/* ╔══════════════════════════════════════════════════════╗
   ║         STEP 2 — EVALUATION MATRIX                    ║
   ╚══════════════════════════════════════════════════════╝ */
function renderStep2() {
  const f = appState.form;
  const rows = EVAL_CONDITIONS.map(cond => {
    const cells = SEVERITY_LEVELS.map(level => {
      const isSel = f.evaluation[cond.id] === level;
      let boxCls = 'bg-white border-slate-200';
      let dotCls = 'opacity-0';
      if (isSel) {
        if (level === 'SEVERE')   { boxCls = 'bg-red-50 border-red-500 shadow-sm shadow-red-200';     dotCls = 'bg-red-500'; }
        else if (level === 'MODERATE') { boxCls = 'bg-amber-50 border-amber-500 shadow-sm shadow-amber-200'; dotCls = 'bg-amber-500'; }
        else if (level === 'MINOR')    { boxCls = 'bg-emerald-50 border-emerald-500 shadow-sm shadow-emerald-200'; dotCls = 'bg-emerald-500'; }
        else                           { boxCls = 'bg-slate-100 border-slate-400 shadow-sm'; dotCls = 'bg-slate-500'; }
      }
      return `
        <td class="text-center py-4">
          <label class="inline-flex cursor-pointer transition-transform hover:scale-110 active:scale-95"
                 onclick="setEval('${cond.id}','${level}')">
            <div class="w-12 h-10 rounded-xl flex items-center justify-center border-2 transition-all duration-200 ${boxCls}">
              <div class="w-2.5 h-2.5 rounded-full transition-all ${dotCls}"></div>
            </div>
          </label>
        </td>`;
    }).join('');
    const proximityExtra = cond.id === 'proximityRisks' ? `
      <input type="text" id="inp-evaluationOther" value="${escHtml(f.evaluationOther)}"
        placeholder="Specify risk..."
        class="mt-2 w-full bg-white border border-slate-200 rounded-lg px-3 py-1.5 text-xs text-slate-800 font-bold focus:border-red-500 outline-none transition-colors" />` : '';
    return `
      <tr class="hover:bg-red-50/50 transition-colors group/row">
        <td class="py-4 px-6">
          <div class="flex items-center gap-3">
            <span class="text-sm font-bold text-slate-800">${cond.label}</span>
          </div>
          ${proximityExtra}
        </td>
        ${cells}
      </tr>`;
  }).join('');

  const dmg = f.damagePercentage;
  const sliderBg = `linear-gradient(to right,#ef4444 ${dmg}%,#fee2e2 ${dmg}%)`;
  return `
    <section class="step-panel">
      <div class="flex items-center justify-between mb-6 border-b-2 border-red-100 pb-2">
        <h2 class="text-xl font-bold text-red-900 uppercase tracking-wider flex items-center gap-2">
          <span class="text-red-500">3.</span> Damage Evaluation Matrix
        </h2>
        <div class="bg-red-50 px-4 py-1.5 rounded-full border border-red-200">
          <span class="text-sm font-bold text-red-900">Damage: <span class="text-red-600" id="damage-pct-display">${dmg}%</span></span>
        </div>
      </div>
      <div class="bg-white/80 rounded-2xl shadow-sm border border-red-100 overflow-hidden">
        <div class="overflow-x-auto">
          <table class="w-full text-left min-w-[700px]">
            <thead class="bg-gradient-to-r from-red-50 to-white">
              <tr>
                <th class="text-slate-500 text-xs font-black uppercase tracking-widest py-4 px-6 w-2/5 border-b border-red-100">Condition</th>
                <th class="text-center text-xs font-black uppercase tracking-widest py-4 border-b border-red-100 w-1/5 text-slate-400">N/A</th>
                <th class="text-center text-xs font-black uppercase tracking-widest py-4 border-b border-red-100 w-1/5 text-emerald-600">MINOR</th>
                <th class="text-center text-xs font-black uppercase tracking-widest py-4 border-b border-red-100 w-1/5 text-amber-600">MODERATE</th>
                <th class="text-center text-xs font-black uppercase tracking-widest py-4 border-b border-red-100 w-1/5 text-red-600">SEVERE</th>
              </tr>
            </thead>
            <tbody class="divide-y divide-slate-100/50">${rows}</tbody>
          </table>
        </div>
        <div class="p-8 bg-gradient-to-t from-red-50/50 to-transparent border-t border-slate-100">
          <div class="flex justify-between items-center mb-6">
            <span class="text-sm font-bold text-slate-700 uppercase tracking-wider">Estimated % of Damage</span>
            <span class="text-4xl font-black text-red-600 drop-shadow-sm" id="damage-pct-display2">${dmg}%</span>
          </div>
          <div class="relative pt-2">
            <input id="inp-damagePercentage" type="range" min="0" max="100" value="${dmg}"
              class="w-full h-3 rounded-full appearance-none cursor-pointer outline-none"
              style="background:${sliderBg}" />
            <div class="flex justify-between text-xs font-bold text-red-900/40 mt-4 px-1 uppercase tracking-wider">
              <span>0%</span><span>25%</span><span>50%</span><span>75%</span><span>100%</span>
            </div>
          </div>
        </div>
      </div>
    </section>`;
}

/* ╔══════════════════════════════════════════════════════╗
   ║       STEP 3 — POSTING & RESTRICTIONS                 ║
   ╚══════════════════════════════════════════════════════╝ */
function renderStep3() {
  const f    = appState.form;
  const rest = f.restrictions;
  const fa   = f.furtherActions;
  const complete = isFormComplete();

  const placardBtn = (id, label, sub, selClsActive) => {
    const sel = f.posting === id;
    const cls = sel
      ? selClsActive
      : 'border-slate-200 bg-white hover:border-slate-300 text-slate-500';
    const radioClsOuter = sel ? 'border-current bg-current' : 'border-slate-300 group-hover:border-slate-400';
    const radioDot = sel ? '<div class="w-2.5 h-2.5 rounded-full bg-white"></div>' : '';
    const labelSize = sel ? 'text-lg' : 'text-base';
    return `
      <label class="flex items-center gap-4 cursor-pointer group flex-1 justify-center py-4 px-4 rounded-2xl border transition-all ${cls}"
             onclick="setPosting('${id}')">
        <div class="w-6 h-6 border-2 rounded-full flex items-center justify-center transition-colors ${radioClsOuter}">${radioDot}</div>
        <div class="flex flex-col items-center">
          <span class="font-black tracking-widest leading-tight ${labelSize}">${label}</span>
          <span class="text-[10px] opacity-80 font-bold uppercase">${sub}</span>
        </div>
      </label>`;
  };

  const cbRow = (id, label, nested, field, text) => {
    const val = appState.form[nested][field];
    return `
      <div class="flex flex-col sm:flex-row sm:items-end gap-3">
        <label class="flex items-center gap-3 cursor-pointer group shrink-0 mb-1 sm:mb-0"

          <div class="cb-box${val ? ' checked' : ''}">${val ? checkSVG : ''}</div>
          <span class="text-sm font-bold text-slate-700">${label}</span>
        </label>
        <input type="text" id="inp-${nested}-${field}Text" value="${escHtml(appState.form[nested][text])}"
          class="flex-1 bg-transparent border-b-2 border-slate-200 focus:border-red-500 outline-none px-2 py-1 text-sm font-bold text-red-900" />
      </div>`;
  };

  const cbRowNoText = (id, label, nested, field) => {
    const val = appState.form[nested][field];
    return `
      <div class="flex flex-col sm:flex-row sm:items-start gap-3">
        <label class="flex items-start gap-3 cursor-pointer group shrink-0 mb-1 sm:mb-0"
               onclick="toggleNested('${nested}','${field}')">
          <div class="cb-box${val ? ' checked' : ''} mt-0.5">${val ? checkSVG : ''}</div>
          <span class="text-sm font-bold text-slate-700 max-w-sm leading-tight">${label}</span>
        </label>
      </div>`;
  };

  const evalItems = [
    { id:'evalStructural', label:'Structural' },
    { id:'evalGeotechnical', label:'Geotechnical' },
    { id:'evalOther', label:'Other' }
  ].map(item => {
    const val = fa[item.id];
    return `
      <label class="flex items-center gap-2 cursor-pointer group" onclick="toggleNested('furtherActions','${item.id}')">
        <div class="cb-box-sm${val ? ' checked' : ''}">${val ? `<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l4 4L19 7"/></svg>` : ''}</div>
        <span class="text-sm font-bold text-slate-600">${item.label}</span>
      </label>`;
  }).join('');

  const btnPreviewCls = complete
    ? 'bg-gradient-to-r from-red-600 to-rose-600 text-white shadow-lg shadow-red-500/40 hover:-translate-y-1 hover:shadow-xl hover:shadow-red-500/50 cursor-pointer'
    : 'bg-slate-200 text-slate-400 cursor-not-allowed border-2 border-slate-300';
  const statusTxt = complete ? 'Ready' : 'Incomplete';

  return `
    <section class="step-panel">
      <h2 class="text-xl font-bold text-red-900 border-b-2 border-red-100 pb-2 mb-6 uppercase tracking-wider flex items-center gap-2">
        <span class="text-red-500">4.</span> Posting &amp; Restrictions
      </h2>
      <div class="flex flex-col md:flex-row gap-4 mb-8">
        ${placardBtn('Green', 'INSPECTED', '(Green placard)', 'border-emerald-500 bg-emerald-50 text-emerald-900 shadow-md shadow-emerald-100 border-2')}
        ${placardBtn('Yellow', 'RESTRICTED', '(Yellow placard)', 'border-amber-500 bg-amber-50 text-amber-900 shadow-md shadow-amber-100 border-2')}
        ${placardBtn('Red', 'UNSAFE', '(Red placard)', 'border-red-500 bg-red-50 text-red-900 shadow-md shadow-red-100 border-2')}
      </div>
      <div class="bg-white/80 p-8 rounded-2xl border border-red-50 shadow-sm shadow-red-50">
        <h3 class="text-sm font-black text-slate-800 uppercase tracking-wider mb-6 pb-2 border-b border-slate-100">Restrictions</h3>
        <div class="space-y-5">
          ${cbRow('doNotEnter','Do not enter following areas:','restrictions','doNotEnter','doNotEnterText')}
          ${cbRow('briefEntry','Brief entry allowed for contents:','restrictions','briefEntry','briefEntryText')}
          ${cbRowNoText('doNotUseFlooded','Do not use flooded/damaged appliances, devices or services until recertified','restrictions','doNotUseFlooded')}
          ${cbRow('otherRestrictions','Other restrictions:','restrictions','otherRestrictions','otherRestrictionsText')}
        </div>
        <div class="mt-8 pt-6 border-t border-slate-100 flex flex-col sm:flex-row gap-3 items-start">
          <span class="text-sm font-bold text-slate-700 mt-2 shrink-0">General Comments:</span>
          <textarea id="inp-comments" rows="3" placeholder="Enter general comments here..."
            class="w-full border-2 border-slate-200 focus:border-red-500 rounded-xl outline-none resize-none px-4 py-3 text-sm leading-relaxed bg-white shadow-sm font-medium">${escHtml(f.comments)}</textarea>
        </div>

        <h3 class="text-sm font-black text-slate-800 uppercase tracking-wider mt-12 mb-6 pb-2 border-b border-slate-100">Further Actions</h3>
        <div class="space-y-5">
          ${cbRow('barricades','Barricades needed in following areas:','furtherActions','barricadesNeeded','barricadesText')}
          <div class="flex flex-col sm:flex-row sm:items-center gap-6 pt-2">
            <span class="text-sm font-bold text-slate-700 shrink-0">Detailed Evaluation rec:</span>
            <div class="flex gap-6 flex-wrap">${evalItems}</div>
          </div>
          ${cbRow('otherRec','Other recommendations:','furtherActions','otherRecommendations','otherRecommendationsText')}
          <div class="pt-2 flex flex-col sm:flex-row gap-3 items-start">
            <span class="text-sm font-bold text-slate-700 mt-2 shrink-0">Action Comments:</span>
            <textarea id="inp-commentsFurther" rows="2" placeholder="Enter further action comments..."
              class="w-full border-2 border-slate-200 focus:border-red-500 rounded-xl outline-none resize-none px-4 py-3 text-sm leading-relaxed bg-white shadow-sm font-medium">${escHtml(fa.commentsFurther)}</textarea>
          </div>
        </div>

        <div class="mt-8 pt-6 border-t border-slate-100 flex justify-between items-center bg-red-50 p-6 rounded-2xl border border-red-100">
          <div>
            <h3 class="font-black text-red-900 text-lg">Report Generation</h3>
            <p class="text-xs font-bold text-red-900/60 uppercase tracking-widest mt-1" id="preview-status">Status: ${statusTxt}</p>
          </div>
          <button id="btn-preview" onclick="handlePreview()"
            class="px-8 py-3.5 rounded-full font-black text-sm tracking-widest transition-all uppercase flex items-center gap-2 ${btnPreviewCls}">
            Preview Official Report
          </button>
        </div>
      </div>
    </section>`;
}

/* ╔══════════════════════════════════════════════════════╗
   ║                FORM SHELL (WIZARD)                    ║
   ╚══════════════════════════════════════════════════════╝ */
function renderForm() {
  const s = appState.step;
  const tabs = ['Inspection','Building','Evaluation','Final'].map((lbl,i) => {
    const active = i === s
      ? 'bg-gradient-to-br from-red-600 to-rose-600 text-white shadow-md shadow-red-500/30 font-black'
      : 'bg-white text-slate-500 font-bold hover:bg-red-50 border border-slate-200';
    return `<button class="flex-1 min-w-[120px] py-3 px-4 rounded-xl text-center transition-all ${active}" onclick="setStep(${i})">
              <div class="text-xs uppercase tracking-widest">${lbl}</div>
            </button>`;
  }).join('');

  const stepContent = [renderStep0, renderStep1, renderStep2, renderStep3][s]();
  const backCls = s === 0
    ? 'border-transparent text-slate-300'
    : 'border-slate-300 text-slate-600 hover:bg-white hover:shadow-sm';
  const nextBtn = s < 3
    ? `<button onclick="setStep(${s+1})" class="px-8 py-2.5 rounded-full font-black text-sm tracking-wider uppercase transition-all bg-red-600 text-white hover:bg-red-700 shadow-md hover:-translate-y-0.5">Next Step</button>`
    : `<div class="w-[100.5px]"></div>`;

  return `
    <div class="min-h-screen bg-gradient-to-br from-white via-red-50/30 to-white selection:bg-red-100 selection:text-red-900 pb-32">
      <!-- Top bar -->
      <div class="bg-gradient-to-r from-red-600 via-red-500 to-rose-500 h-2 w-full fixed top-0 z-50 shadow-md print:hidden"></div>
      <div class="max-w-5xl mx-auto px-4 sm:px-6 pt-12">
        <div class="bg-white/80 backdrop-blur-xl shadow-2xl shadow-red-900/5 rounded-3xl overflow-hidden border border-red-100">
          <!-- Header -->
          <div class="bg-white border-b border-red-100 py-6 px-8 flex items-center gap-6">
            <img src="${BSU_LOGO}" alt="BSU Logo" class="h-12 sm:h-14 w-auto object-contain" />
            <div>
              <h1 class="text-2xl sm:text-3xl font-black text-red-900 tracking-tight">Rapid Damage Assessment Form</h1>
              <p class="text-[10px] font-bold text-red-900/50 uppercase tracking-widest">Rapid Damage Assessment &amp; Needs Analysis</p>
            </div>
          </div>
          <!-- Tabs -->
          <div class="bg-red-50/50 border-b border-red-100 px-8 py-4">
            <div class="flex gap-2 sm:gap-4 overflow-x-auto hide-scrollbar">${tabs}</div>
          </div>
          <!-- Step content -->
          <div class="p-6 sm:p-10 min-h-[500px]" id="step-content">
            ${stepContent}
          </div>
          <!-- Footer nav -->
          <div class="bg-slate-50 border-t border-slate-200 px-10 py-6 flex justify-between items-center rounded-b-3xl">
            <button onclick="setStep(Math.max(0,appState.step-1))" ${s===0?'disabled':''} 
              class="px-6 py-2.5 rounded-full font-bold text-sm tracking-wider uppercase transition-colors border ${backCls}">
              Back
            </button>
            <div class="text-xs font-black text-slate-400 uppercase tracking-widest">Step ${s+1} of 4</div>
            ${nextBtn}
          </div>
        </div>
      </div>
    </div>`;
}

/* ╔══════════════════════════════════════════════════════╗
   ║              REPORT VIEW                              ║
   ╚══════════════════════════════════════════════════════╝ */
function renderReport() {
  const f    = appState.form;
  const cfg  = STATUS_CONFIG[f.posting] || STATUS_CONFIG.Green;

  /* posting colour classes */
  const postCls = f.posting === 'Red'
    ? 'border-red-600 text-red-700 bg-red-50'
    : f.posting === 'Yellow'
    ? 'border-amber-500 text-amber-700 bg-amber-50'
    : 'border-emerald-600 text-emerald-700 bg-emerald-50';
  const verdictBoxCls = f.posting === 'Red'
    ? 'border-red-600 bg-red-50 text-red-900'
    : f.posting === 'Yellow'
    ? 'border-amber-500 bg-amber-50 text-amber-900'
    : 'border-emerald-600 bg-emerald-50 text-emerald-900';

  /* section 1 — building description cards */
  const s1items = [
    { label:'Building Name',      value: f.buildingName },
    { label:'Primary Occupancy',  value: f.primaryOccupancy.join(', ') || f.otherOccupancy },
    { label:'Construction Type',  value: f.typeOfConstruction.join(', ') || f.otherConstruction },
    { label:'Number of Stories',  value: f.storyAboveGround },
    { label:'Inspection Type',    value: f.areasInspected },
    { label:'Estimated Damage',   value: `${f.damagePercentage}%` },
  ].map(it => `
    <div class="border border-slate-200 rounded-lg p-4 break-inside-avoid print:p-2">
      <div class="text-[9px] font-black text-slate-500 tracking-widest uppercase mb-1 print:text-[8px]">${it.label}</div>
      <div class="text-sm font-bold text-slate-900 print:text-xs">${escHtml(it.value) || '—'}</div>
    </div>`).join('');

  /* section 2 — eval matrix */
  const s2rows = EVAL_CONDITIONS.slice(0,6).map(cond => {
    const level = f.evaluation[cond.id];
    const barW  = level==='SEVERE' ? 'w-full bg-red-500' : level==='MODERATE' ? 'w-2/3 bg-amber-500' : level==='MINOR' ? 'w-1/3 bg-emerald-500' : 'w-0';
    return `
      <tr class="bg-white">
        <td class="py-3 px-4 font-bold text-slate-800 border-r border-slate-100 w-1/2 print:py-1 print:px-2 print:text-[10px]">${cond.label}</td>
        <td class="py-3 px-4 w-1/3 print:py-1 print:px-2">
          <div class="w-full h-1.5 bg-slate-100 rounded-full overflow-hidden">
            <div class="h-full transition-all ${barW}"></div>
          </div>
        </td>
        <td class="py-3 px-4 text-center border-l border-slate-100 print:py-1 print:px-2">
          <span class="px-2 py-0.5 text-[10px] font-black tracking-wide rounded border ${getSeverityBadgeClass(level)}">${level}</span>
        </td>
      </tr>`;
  }).join('');

  /* section 4 — restrictions list items */
  const resList = [];
  if (f.restrictions.doNotEnter)     resList.push(`<li>• Do not enter: <strong>${escHtml(f.restrictions.doNotEnterText)}</strong></li>`);
  if (f.restrictions.briefEntry)     resList.push(`<li>• Brief entry allowed for contents: <strong>${escHtml(f.restrictions.briefEntryText)}</strong></li>`);
  if (f.restrictions.doNotUseFlooded) resList.push(`<li>• Do not use flooded/damaged appliances, devices or services until recertified.</li>`);
  if (f.restrictions.otherRestrictions) resList.push(`<li>• Other restrictions: <strong>${escHtml(f.restrictions.otherRestrictionsText)}</strong></li>`);
  if (!resList.length) resList.push(`<li class="text-slate-500 italic print:text-slate-800">No specific restrictions documented.</li>`);

  /* section 5 — further actions */
  const faList = [];
  if (f.furtherActions.barricadesNeeded) faList.push(`<li>• Barricades needed: <strong>${escHtml(f.furtherActions.barricadesText) || 'Unspecified area'}</strong></li>`);
  const evalTypes = [
    f.furtherActions.evalStructural   && 'Structural',
    f.furtherActions.evalGeotechnical && 'Geotechnical',
    f.furtherActions.evalOther        && 'Other',
  ].filter(Boolean);
  if (evalTypes.length) faList.push(`<li>• Detailed Evaluation: <strong>${evalTypes.join(', ')}</strong></li>`);
  if (f.furtherActions.otherRecommendations) faList.push(`<li>• Other recommendations: <strong>${escHtml(f.furtherActions.otherRecommendationsText) || 'None'}</strong></li>`);
  const faEmpty = !faList.length;

  const additionalComments = f.furtherActions.commentsFurther ? `
    <div class="border border-slate-200 rounded-lg p-5 bg-white print:p-2 col-span-2">
      <div class="text-[9px] font-black text-slate-500 tracking-widest uppercase mb-1 print:text-[8px]">Additional Comments</div>
      <div class="text-sm font-medium text-slate-800 print:text-[10px] whitespace-pre-wrap">${escHtml(f.furtherActions.commentsFurther)}</div>
    </div>` : '';

  return `
    <div class="min-h-screen bg-slate-100 px-4 py-8 md:py-12 print:bg-white print:p-0 print:m-0" style="animation:fadeInUp 0.5s ease both">
      <!-- Controls (no-print) -->
      <div class="max-w-4xl mx-auto flex justify-between items-center mb-6 no-print">
        <button onclick="setView('form')" class="px-5 py-2.5 rounded-xl border border-slate-300 text-slate-700 font-bold text-sm bg-white hover:bg-slate-50 transition-colors">
          ← Edit Form
        </button>
        <button onclick="window.print()" class="px-6 py-2.5 rounded-xl bg-red-600 text-white font-bold text-sm hover:shadow-lg transition-all">
          Print / Save PDF
        </button>
      </div>

      <!-- Paper -->
      <div class="max-w-4xl mx-auto bg-white border border-slate-200 overflow-hidden shadow-lg print:shadow-none print:border-none print:max-w-none print:w-full print:m-0">

        <!-- Report Header -->
        <div class="bg-white px-10 pt-10 pb-6 border-b-2 border-slate-800 print:px-8 print:pt-6 print:pb-4">
          <div class="flex justify-between items-start">
            <div class="flex items-start gap-6 print:gap-4">
              <img src="${BSU_LOGO}" alt="BSU Logo" class="h-16 w-auto object-contain print:h-10" />
              <div>
                <div class="text-[10px] font-bold text-slate-500 tracking-widest uppercase mb-2 print:text-black print:mb-1">Official Document</div>
                <h1 class="text-3xl font-black text-slate-900 tracking-tight mb-1 print:text-black print:text-xl">Rapid Damage Assessment</h1>
                <h2 class="text-sm font-bold text-slate-500 tracking-wide print:text-slate-600 print:text-xs">Building Inspection Report</h2>
              </div>
            </div>
            ${f.posting ? `
            <div class="px-6 py-3 border-2 rounded ${postCls} print:border-2 print:px-3 print:py-1">
              <span class="font-black text-xl flex items-center gap-2 print:text-sm uppercase tracking-wider">${cfg.label}</span>
            </div>` : ''}
          </div>
          <div class="w-full flex gap-8 md:gap-12 mt-8 pt-6 border-t border-slate-100 print:border-t print:mt-4 print:pt-2 print:gap-6">
            <div>
              <div class="text-[9px] font-black tracking-widest text-slate-400 uppercase pb-1 print:text-slate-500">Date</div>
              <div class="text-sm font-bold text-slate-800 print:text-xs">${escHtml(f.inspectionDate) || '—'}</div>
            </div>
            <div>
              <div class="text-[9px] font-black tracking-widest text-slate-400 uppercase pb-1 print:text-slate-500">Time</div>
              <div class="text-sm font-bold text-slate-800 print:text-xs">${escHtml(f.time) || '—'}</div>
            </div>
            <div class="flex-1 max-w-[200px]">
              <div class="text-[9px] font-black tracking-widest text-slate-400 uppercase pb-1 print:text-slate-500">Inspector</div>
              <div class="text-sm font-bold text-slate-800 truncate pr-4 print:text-xs">${escHtml(f.inspector) || '—'}</div>
            </div>
            <div class="flex-1">
              <div class="text-[9px] font-black tracking-widest text-slate-400 uppercase pb-1 print:text-slate-500">Agency</div>
              <div class="text-sm font-bold text-slate-800 truncate print:text-xs">${escHtml(f.agencyCampus) || '—'}</div>
            </div>
          </div>
        </div>

        <!-- Report Body -->
        <div class="p-10 space-y-10 print:p-8 print:py-6 print:space-y-4">

          <!-- S1 -->
          <div>
            <div class="flex items-center gap-3 mb-4 print:mb-1">
              <h3 class="text-xs font-black text-slate-800 tracking-widest uppercase border-b-2 border-slate-200 pb-1 w-full print:text-[10px]">Section 1 — Building Description</h3>
            </div>
            <div class="grid grid-cols-2 gap-4 print:gap-2">${s1items}</div>
          </div>

          <!-- S2 -->
          <div class="break-inside-avoid">
            <div class="flex items-center gap-3 mb-4 print:mb-1">
              <h3 class="text-xs font-black text-slate-800 tracking-widest uppercase border-b-2 border-slate-200 pb-1 w-full print:text-[10px]">Section 2 — Evaluation Matrix</h3>
            </div>
            <div class="border border-slate-200 rounded-lg overflow-hidden">
              <table class="w-full text-sm print:text-xs">
                <thead class="bg-slate-50 border-b border-slate-200">
                  <tr>
                    <th class="text-left font-black text-slate-700 text-[9px] tracking-widest uppercase py-3 px-4 print:py-1 print:px-2">Condition</th>
                    <th class="text-center font-black text-slate-700 text-[9px] tracking-widest uppercase py-3 px-4 print:py-1 print:px-2">Severity</th>
                    <th class="text-center font-black text-slate-700 text-[9px] tracking-widest uppercase py-3 px-4 print:py-1 print:px-2">Level</th>
                  </tr>
                </thead>
                <tbody class="divide-y divide-slate-100">${s2rows}</tbody>
              </table>
            </div>
          </div>

          <!-- S3 + S4 -->
          <div class="grid grid-cols-1 sm:grid-cols-3 print:grid-cols-3 gap-6 pb-6 border-b-2 border-slate-200 break-inside-avoid print:gap-3 print:pb-2">
            <div class="sm:col-span-1 print:col-span-1 border-r border-slate-100 pr-4 print:border-slate-200 flex flex-col h-full">
              <div class="flex items-center gap-3 mb-4 print:mb-1 shrink-0">
                <h3 class="text-xs font-black text-slate-800 tracking-widest uppercase border-b-2 border-slate-200 pb-1 w-full print:text-[10px]">Section 3 — Verdict</h3>
              </div>
              <div class="rounded-xl p-6 text-center flex-1 flex flex-col justify-center border-2 print:p-3 ${verdictBoxCls}">
                <h2 class="text-3xl font-black mb-1 tracking-tight print:text-lg uppercase">${cfg.label}</h2>
                <p class="text-[10px] font-bold opacity-80 uppercase tracking-widest print:text-[8px]">${cfg.sub}</p>
                <div class="mt-6 pt-4 border-t border-slate-300 text-xl font-black print:text-sm print:mt-1 print:pt-1">
                  ${f.damagePercentage}% Damage
                </div>
              </div>
            </div>
            <div class="sm:col-span-2 print:col-span-2 pl-2 flex flex-col h-full">
              <div class="flex items-center gap-3 mb-4 print:mb-1 shrink-0">
                <h3 class="text-xs font-black text-slate-800 tracking-widest uppercase border-b-2 border-slate-200 pb-1 w-full print:text-[10px]">Section 4 — Assessment Notes</h3>
              </div>
              <div class="space-y-4 print:space-y-2">
                <div class="border border-slate-200 rounded-lg p-5 bg-white print:p-2">
                  <div class="text-[9px] font-black text-slate-500 tracking-widest uppercase mb-1 print:text-[8px]">Comments &amp; Observations</div>
                  <div class="text-sm font-medium text-slate-800 leading-relaxed whitespace-pre-wrap print:text-[10px]">${escHtml(f.comments) || 'No comments written.'}</div>
                </div>
                <div class="border border-slate-200 rounded-lg p-5 bg-white print:p-2">
                  <div class="text-[9px] font-black text-slate-500 tracking-widest uppercase mb-1 print:text-[8px]">Detailed Restrictions / Actions</div>
                  <ul class="text-sm font-medium text-slate-800 space-y-1 print:text-[10px]">${resList.join('')}</ul>
                </div>
              </div>
            </div>
          </div>

          <!-- S5 -->
          <div class="mt-6 pt-0 break-inside-avoid print:mt-1">
            <div class="flex items-center gap-3 mb-4 print:mb-1">
              <h3 class="text-xs font-black text-slate-800 tracking-widest uppercase border-b-2 border-slate-200 pb-1 w-full print:text-[10px]">Section 5 — Further Actions</h3>
            </div>
            <div class="grid grid-cols-1 sm:grid-cols-2 print:grid-cols-2 gap-4 print:gap-2">
              <div class="border border-slate-200 rounded-lg p-5 bg-white print:p-2 col-span-2">
                <div class="text-[9px] font-black text-slate-500 tracking-widest uppercase mb-1 print:text-[8px]">Action Items &amp; Recommendations</div>
                <ul class="text-sm font-medium text-slate-800 space-y-1 print:text-[10px]">
                  ${faList.join('') || '<div class="text-slate-500 italic print:text-[10px]">No further actions recommended.</div>'}
                </ul>
              </div>
              ${additionalComments}
            </div>
          </div>

          <!-- Signature -->
          <div class="flex justify-between items-end pt-4 pb-4 print:mt-auto print:pt-4 print:pb-0">
            <div class="text-[9px] font-black text-slate-400 tracking-widest uppercase">Tracking No. ________________</div>
            <div class="text-center w-64 border-t border-slate-400 pt-2">
              <div class="text-sm font-black text-slate-800 truncate print:text-xs">${escHtml(f.inspector) || 'Inspector Name'}</div>
              <div class="text-[9px] font-bold text-slate-500 tracking-widest uppercase">Authorized Assessor</div>
            </div>
          </div>

        </div><!-- /body -->
      </div><!-- /paper -->
    </div>`;
}

/* ╔══════════════════════════════════════════════════════╗
   ║            RENDER DISPATCHER                          ║
   ╚══════════════════════════════════════════════════════╝ */
function escHtml(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}

function render() {
  const root = document.getElementById('app');
  root.innerHTML = appState.view === 'form' ? renderForm() : renderReport();
  document.title  = appState.view === 'form' ? 'RDANA Report' : 'RDANA Result';
  bindAllInputs();
}

function bindAllInputs() {
  const s = appState.step;
  if (s === 0) {
    bindInput('inp-inspector',      'inspector');
    bindInput('inp-inspectionDate', 'inspectionDate');
    bindInput('inp-time',           'time');
    bindInput('inp-agencyCampus',   'agencyCampus');
  } else if (s === 1) {
    bindInput('inp-buildingName',     'buildingName');
    bindInput('inp-address',          'address');
    bindInput('inp-buildingMarshal',  'buildingMarshal');
    bindInput('inp-storyAboveGround', 'storyAboveGround');
    bindInput('inp-storyBelowGround', 'storyBelowGround');
    bindInput('inp-otherConstruction','otherConstruction');
    bindInput('inp-otherOccupancy',   'otherOccupancy');
  } else if (s === 2) {
    bindInput('inp-evaluationOther',  'evaluationOther');
    bindInput('inp-damagePercentage', 'damagePercentage');
  } else if (s === 3) {
    bindInput('inp-comments',         'comments');
    bindInput('inp-commentsFurther',  'commentsFurther', 'furtherActions');
    // nested text fields
    const nestedMap = [
      ['inp-restrictions-doNotEnterText',       'restrictions','doNotEnterText'],
      ['inp-restrictions-briefEntryText',        'restrictions','briefEntryText'],
      ['inp-restrictions-otherRestrictionsText', 'restrictions','otherRestrictionsText'],
      ['inp-furtherActions-barricadesText',       'furtherActions','barricadesText'],
      ['inp-furtherActions-otherRecommendationsText','furtherActions','otherRecommendationsText'],
    ];
    nestedMap.forEach(([id, section, field]) => {
      const el = document.getElementById(id);
      if (!el) return;
      el.addEventListener('input', () => { appState.form[section][field] = el.value; });
    });
    /* comments textarea doesn't use nested */
    const commEl = document.getElementById('inp-comments');
    if (commEl) commEl.addEventListener('input', () => { appState.form.comments = commEl.value; });
    const cfEl = document.getElementById('inp-commentsFurther');
    if (cfEl)  cfEl.addEventListener('input', () => { appState.form.furtherActions.commentsFurther = cfEl.value; });
  }
}

/* ╔══════════════════════════════════════════════════════╗
   ║        GLOBAL EVENT HANDLERS (called by onclick)      ║
   ╚══════════════════════════════════════════════════════╝ */
function setStep(n) {
  appState.step = Math.max(0, Math.min(3, n));
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function setView(v) {
  appState.view = v;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function setAreaInspected(area) {
  appState.form.areasInspected = area;
  /* re-render only the radio buttons region without full re-render for perf */
  render();
}

function toggleArray(field, item) {
  const arr = appState.form[field];
  if (arr.includes(item)) {
    appState.form[field] = arr.filter(i => i !== item);
  } else {
    appState.form[field] = [...arr, item];
  }
  render();
}

function setEval(condId, level) {
  appState.form.evaluation[condId] = level;
  render();
}

function setPosting(id) {
  appState.form.posting = id;
  render();
}

function toggleNested(section, field) {
  appState.form[section][field] = !appState.form[section][field];
  render();
}

function handlePreview() {
  if (!isFormComplete()) {
    alert('Please ensure the Inspector Name, Building Name, and Final Posting (Verdict) are filled out before generating the report.');
    return;
  }
  setView('report');
}

function refreshPreviewBtn() {
  const btn = document.getElementById('btn-preview');
  const status = document.getElementById('preview-status');
  if (!btn) return;
  const complete = isFormComplete();
  if (complete) {
    btn.className = 'px-8 py-3.5 rounded-full font-black text-sm tracking-widest transition-all uppercase flex items-center gap-2 bg-gradient-to-r from-red-600 to-rose-600 text-white shadow-lg shadow-red-500/40 hover:-translate-y-1 hover:shadow-xl cursor-pointer';
  } else {
    btn.className = 'px-8 py-3.5 rounded-full font-black text-sm tracking-widest transition-all uppercase flex items-center gap-2 bg-slate-200 text-slate-400 cursor-not-allowed border-2 border-slate-300';
  }
  if (status) status.textContent = 'Status: ' + (complete ? 'Ready' : 'Incomplete');
}

/* ══ BOOT ══ */
render();
</script>
</body>
</html>
